<svg viewBox="0 0 200 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Elegant Omnia infinity mark -->
  <g transform="translate(4, 4)">
    <!-- Left loop: sweeps up-right, around and back -->
    <path d="M37 22
             C37 22 28 6 20 4
             C13 2 7 7 5 14
             C3 21 6 30 13 34
             C20 38 28 35 33 30
             C38 25 37 22 37 22Z"
          stroke="#e5007d" stroke-width="2.8" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right loop -->
    <path d="M37 22
             C37 22 46 38 54 40
             C61 42 67 37 69 30
             C71 23 68 14 61 10
             C54 6 46 9 41 14
             C36 19 37 22 37 22Z"
          stroke="#e5007d" stroke-width="2.8" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot — upper left of left loop -->
    <circle cx="12" cy="7" r="3" fill="#e5007d"/>
  </g>
  <!-- "Wiom" text — big, bold, pink -->
  <text x="92" y="38" font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900" font-size="34" fill="#e5007d" letter-spacing="-1">Wiom</text>
</svg>
